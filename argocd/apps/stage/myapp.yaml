apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-stage
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/balas-docker/bala-devops-portfolio.git
    targetRevision: HEAD
    path: argocd/helm/myapp

    helm:
      valueFiles:
        - argocd/environments/stage-env-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: stage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true